name: Conexão Solidária - CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  API_IMAGE_NAME: conexao-solidaria-api
  WORKER_IMAGE_NAME: conexao-solidaria-worker

jobs:
  build-test:
    name: Build e testes .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Informações do .NET
        run: dotnet --info

      - name: Restaurar dependências
        run: dotnet restore ConexaoSolidaria.sln

      - name: Build da solution
        run: dotnet build ConexaoSolidaria.sln --configuration Release --no-restore

      - name: Executar testes
        run: dotnet test ConexaoSolidaria.sln --configuration Release --no-build --verbosity normal

  docker-build:
    name: Gerar imagens Docker
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Gerar imagem Docker da API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ConexaoSolidaria.Api/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.API_IMAGE_NAME }}:latest

      - name: Gerar imagem Docker do Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ConexaoSolidaria.DonationWorker/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.WORKER_IMAGE_NAME }}:latest

      - name: Listar imagens geradas
        run: docker images | grep conexao-solidaria
